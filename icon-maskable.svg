        <rect x="0" y="307.69" width="600" height="30.77" fill="#B22234"/>
        <rect x="0" y="369.23" width="600" height="30.77" fill="#B22234"/>
        <rect x="0" y="0" width="240" height="215.4" fill="#3C3B6E"/>
        <g fill="#ffffff">
          <circle cx="30" cy="30" r="11"/><circle cx="75" cy="30" r="11"/><circle cx="120" cy="30" r="11"/><circle cx="165" cy="30" r="11"/><circle cx="210" cy="30" r="11"/>
          <circle cx="52" cy="72" r="11"/><circle cx="97" cy="72" r="11"/><circle cx="142" cy="72" r="11"/><circle cx="187" cy="72" r="11"/>
