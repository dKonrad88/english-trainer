<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b2c63"/>
      <stop offset="1" stop-color="#14478c"/>
    </linearGradient>
    <clipPath id="lp"><path d="M150,372 L500,408 L500,648 L188,684 Z"/></clipPath>
    <clipPath id="rp"><path d="M524,408 L874,372 L836,684 L524,648 Z"/></clipPath>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- conteúdo reduzido (~86%) para caber na zona segura da máscara -->
